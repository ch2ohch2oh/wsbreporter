<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r/{{SUBREDDIT}} · {{DATE_YMD}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --muted: #666666;
            --border: #e5e5e5;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --code-bg: #f4f4f5;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #030303;
                --text: #d7dadc;
                --muted: #818384;
                --border: #343536;
                --accent: #60a5fa;
                --accent-hover: #93bbfd;
                --code-bg: #1a1a1a;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Reddit Sans", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 0.9375rem;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            padding: clamp(1rem, 2vw + 0.5rem, 2.5rem);
        }
        .container {
            max-width: min(100ch, 90vw);
            margin: 0 auto;
            padding: 0 clamp(1rem, 3vw, 2.5rem);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }
        h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.375rem;
            border-bottom: 2px solid var(--text);
            color: var(--muted);
        }
        h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }
        p {
            margin-bottom: 0.75rem;
        }
        p:last-child {
            margin-bottom: 0;
        }
        a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
        }
        a:hover {
            color: var(--accent-hover);
            text-decoration-thickness: 2px;
        }
        strong {
            font-weight: 700;
        }
        em {
            font-style: italic;
        }
        blockquote {
            margin: 0.75rem 0;
            padding: 0.5rem 1rem;
            border-left: 3px solid var(--border);
            color: var(--muted);
        }
        blockquote p:last-child { margin-bottom: 0; }
        ul, ol {
            margin: 1rem 0 1.25rem 1.5rem;
        }
        li {
            margin-bottom: 0.375rem;
        }
        hr {
            border: 0;
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }
        code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.875em;
            background: var(--code-bg);
            padding: 0.125rem 0.375rem;
            border-radius: 3px;
        }
        pre {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.875rem;
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 1.25rem 0;
        }
        .footer {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8125rem;
            color: var(--muted);
            line-height: 2;
        }
        .footer a {
            color: var(--muted);
        }
        .footer a:hover {
            color: var(--text);
        }
        @media print {
            body { padding: 0; background: white; color: black; }
            a { text-decoration: none; color: black; }
            .footer { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        {{CONTENT}}
        <div class="footer">
            <p>WSB Reporter · {{DATE_FULL}}</p>
            <p>
                <a href="rss.xml">RSS</a>
                · <a href="https://follow.it/hindsight-capital-management">follow.it</a>
                · <a href="catalog.html">Archive</a>
                · <a href="disclaimer.html">Disclaimer</a>
            </p>
        </div>
    </div>
</body>
</html>
